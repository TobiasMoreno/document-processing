# Local dev stack for document-processing.
#
# Usage:
#   docker-compose up -d
#   docker-compose down       (preserves volumes)
#   docker-compose down -v    (resets postgres + minio data)
#
# Defaults:
#   Postgres   localhost:5432   user=documents pass=documents db=documents
#   MinIO API  http://localhost:9000  root=minioadmin pass=minioadmin
#   MinIO UI   http://localhost:9001  (same credentials)
#   Bucket     "documents" is created automatically by minio-init.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: documents
      POSTGRES_PASSWORD: documents
      POSTGRES_DB: documents
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U documents -d documents"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      (mc ls local/documents >/dev/null 2>&1 || mc mb local/documents) &&
      echo 'bucket documents ready'
      "
    restart: "no"

volumes:
  postgres-data:
  minio-data:
