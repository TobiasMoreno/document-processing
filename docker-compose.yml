# Local dev stack for document-processing.
#
# Usage:
#   docker-compose up -d
#   docker-compose down       (preserves volumes)
#   docker-compose down -v    (resets postgres + minio data)
#
# Defaults:
#   Postgres   localhost:5432   user=documents pass=documents db=documents
#   MinIO API  http://localhost:9000  root=minioadmin pass=minioadmin
#   MinIO UI   http://localhost:9001  (same credentials)
#   Bucket     "documents" is created automatically by minio-init.
#
# OCR (Tesseract via Tess4J):
#   The app reads tessdata files from app.ocr.tessdata-path (env APP_OCR_TESSDATA_PATH).
#   Default language is "eng" (override with APP_OCR_LANGUAGE).
#   Local setup options:
#     - Windows: install Tesseract-OCR and point APP_OCR_TESSDATA_PATH at e.g.
#       C:\Program Files\Tesseract-OCR\tessdata
#     - Linux/macOS: install tesseract-ocr and point at /usr/share/tesseract-ocr/4.00/tessdata
#       (or wherever the package places the .traineddata files).
#   When the app runs in a container, mount the tessdata directory and set the env var.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: documents
      POSTGRES_PASSWORD: documents
      POSTGRES_DB: documents
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U documents -d documents"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    environment:
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      (mc ls local/documents >/dev/null 2>&1 || mc mb local/documents) &&
      echo 'bucket documents ready'
      "
    restart: "no"

volumes:
  postgres-data:
  minio-data:
  kafka-data:
