spring:
  application:
    name: tobias-moreno

  datasource:
    url: jdbc:postgresql://localhost:5432/documents
    username: documents
    password: documents

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

app:
  storage:
    minio:
      endpoint: http://localhost:9000
      access-key: minioadmin
      secret-key: minioadmin
      bucket: documents
  upload:
    max-file-size: 10485760
    allowed-content-types:
      - application/pdf
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - image/png
      - image/jpeg
  kafka:
    bootstrap-servers: ${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    publish-timeout-ms: 5000
    topics:
      document-uploaded: document.uploaded
    consumer:
      group-id: document-processor
      concurrency: 1
  ocr:
    # Absolute path to the directory containing Tesseract .traineddata files.
    # Override via APP_OCR_TESSDATA_PATH (e.g. /usr/share/tesseract-ocr/4.00/tessdata on Linux,
    # C:\\Program Files\\Tesseract-OCR\\tessdata on Windows).
    tessdata-path: ${APP_OCR_TESSDATA_PATH:}
    language: eng
